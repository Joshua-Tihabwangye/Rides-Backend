services:
  backend:
    image: node:22-slim
    container_name: evzone-backend-dev
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://evzone:evzone_secret@evzone-postgres:5432/evzone
      DB_HOST: evzone-postgres
      DB_PORT: 5432
      NODE_ENV: development
      REDIS_URL: redis://evzone-redis:6379
      KAFKA_BROKERS: kafka:9092
      KAFKA_CLIENT_ID: evzone-backend
      KAFKA_CONSUMER_GROUP: evzone-backend-consumers
      KAFKA_TX_ID: evzone-backend-tx
      KAFKA_DISABLED: "false"
    networks:
      - evzone-network
    command: >
      sh -c "
        npm install &&
        npx prisma generate &&
        npm run build &&
        node dist/main.js
      "
    stdin_open: true
    tty: true

volumes:
  node_modules:

networks:
  evzone-network:
    external: true
    name: evzone-backend-api_evzone-network
